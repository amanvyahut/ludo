<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ludo Debug</title>
<style>
  body { background:#111; color:#eee; font-family:monospace; padding:20px; }
  #log { background:#000; border:1px solid #333; padding:16px; border-radius:8px; min-height:200px; white-space:pre-wrap; font-size:13px; line-height:1.6; }
  .ok  { color:#2DC653; }
  .err { color:#E63946; }
  .info{ color:#F4A261; }
  button { background:#F4A261; color:#111; border:none; padding:10px 20px; border-radius:8px; font-size:15px; font-weight:bold; cursor:pointer; margin:10px 0; display:block; }
</style>
</head>
<body>
<h2>🎲 Firebase Debug</h2>
<button id="testBtn">▶ Test Firebase Connection</button>
<div id="log">Click button to start...\n</div>

<script>
const logEl = document.getElementById('log');
function log(msg, type='info') {
  logEl.innerHTML += '<span class="' + type + '">' + msg + '</span>\n';
  logEl.scrollTop = logEl.scrollHeight;
}

// Dynamically load Firebase scripts
function loadScript(src) {
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = src;
    s.onload = resolve;
    s.onerror = () => reject(new Error('Failed to load: ' + src));
    document.head.appendChild(s);
  });
}

document.getElementById('testBtn').addEventListener('click', async function() {
  logEl.innerHTML = '';
  log('=== Firebase Debug Test ===', 'info');

  // Load Firebase SDKs
  log('⏳ Loading Firebase SDK...', 'info');
  try {
    await loadScript('https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js');
    log('✅ firebase-app loaded', 'ok');
    await loadScript('https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js');
    log('✅ firebase-database loaded', 'ok');
  } catch(e) {
    log('❌ SDK load failed: ' + e.message, 'err');
    log('', '');
    log('→ Internet connection check karo', 'info');
    log('→ Ya browser mein ye URL kholo manually:', 'info');
    log('  https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js', 'info');
    return;
  }

  // Init Firebase
  const firebaseConfig = {
    apiKey: "AIzaSyAKLZ4dHYp0ZFLolMB5XPxDUu-QPXB_MqA",
    authDomain: "talkzone-b3488.firebaseapp.com",
    databaseURL: "https://talkzone-b3488-default-rtdb.firebaseio.com",
    projectId: "talkzone-b3488",
    storageBucket: "talkzone-b3488.firebasestorage.app",
    messagingSenderId: "526945974843",
    appId: "1:526945974843:web:997fb419c944ae9c1fba1e"
  };

  try {
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    log('✅ Firebase initialized', 'ok');
  } catch(e) {
    log('❌ Init failed: ' + e.message, 'err');
    return;
  }

  // DB write test
  let db;
  try {
    db = firebase.database();
    log('✅ Database instance ok', 'ok');
  } catch(e) {
    log('❌ Database error: ' + e.message, 'err');
    return;
  }

  log('⏳ Testing WRITE...', 'info');
  try {
    await db.ref('ludo_test/ping').set({ ts: Date.now() });
    log('✅ Write SUCCESS!', 'ok');
  } catch(e) {
    log('❌ Write FAILED: ' + e.message, 'err');
    log('', '');
    log('→ SOLUTION: Firebase Console kholo', 'info');
    log('→ Realtime Database → Rules tab', 'info');
    log('→ Ye paste karo aur Publish karo:', 'info');
    log('  { "rules": { ".read": true, ".write": true } }', 'ok');
    return;
  }

  log('⏳ Testing READ...', 'info');
  try {
    const snap = await db.ref('ludo_test/ping').get();
    log('✅ Read SUCCESS! ' + JSON.stringify(snap.val()), 'ok');
  } catch(e) {
    log('❌ Read FAILED: ' + e.message, 'err');
    return;
  }

  log('', '');
  log('🎉 ALL TESTS PASSED! Firebase working.', 'ok');
  log('→ Ab main ludo-chat.html use karo.', 'ok');
});
</script>
</body>
</html>
